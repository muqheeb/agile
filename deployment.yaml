I’ll give you safe + correct steps (Windows PowerShell).
 IMPORTANT

 STEP 1: Stop ALL running containers
docker stop (docker ps -q)
 STEP 2: Remove ALL containers
docker rm (docker ps -aq)
 STEP 3: Remove ALL images
docker rmi (docker images -q)
 If error comes → FORCE remove
docker rmi -f (docker images -q)
 BEST SHORTCUT (RECOMMENDED)
 This one command cleans everything:
docker system prune -a -f
✔ Removes:
• All containers
• All images
• Cache
 STEP 4: Verify clean
docker ps -a
docker images
 Should show empty
