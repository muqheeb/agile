# 💻 3. Java Code (FULL PROJECT)

## 🔹 UnitConsumer.java

```java
package com.ebilling;

public class UnitConsumer {
    public double calculateBill(int units) {
        double rate = 5.0;
        return units * rate;
    }
}
```

---

## 🔹 SalesBilling.java

```java
package com.ebilling;

public class SalesBilling {
    public double addTax(double amount) {
        double tax = 0.18; // 18% GST
        return amount + (amount * tax);
    }
}
```

---

## 🔹 FinalBill.java

```java
package com.ebilling;

public class FinalBill {
    public double generateFinal(double amount) {
        return amount;
    }
}
```

---

## 🔹 App.java (Main Class)

```java
package com.ebilling;

public class App {
    public static void main(String[] args) {

        UnitConsumer uc = new UnitConsumer();
        SalesBilling sb = new SalesBilling();
        FinalBill fb = new FinalBill();

        int units = 100;

        double baseAmount = uc.calculateBill(units);
        double taxedAmount = sb.addTax(baseAmount);
        double finalAmount = fb.generateFinal(taxedAmount);

        System.out.println("Units Consumed: " + units);
        System.out.println("Final Bill Amount: ₹" + finalAmount);
    }
}
```

